receivers:
  otlp:
    protocols:
      grpc:
      http:

exporters:
  otlphttp:
    endpoint: https://otlp.ddog-gov.com
    headers:
      dd-api-key: $DD_API_KEY
      dd-otlp-source: datadog
      dd-otel-span-mapping: '{"span_name_as_resource_name": true}'
  debug:
    verbosity: detailed

service:
  telemetry:
    logs:
      level: debug
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlphttp, debug]
