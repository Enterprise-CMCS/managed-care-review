query indexContractsStripped($input: IndexContractsStrippedInput) {
    indexContractsStripped(input: $input) {
        totalCount
        edges {
            node {
                id
                createdAt
                updatedAt
                status
                reviewStatus
                consolidatedStatus
                initiallySubmittedAt
                stateCode
                state {
                    code
                    name
                    programs {
                        id
                        name
                        fullName
                        isRateProgram
                    }
                }
                stateNumber
                contractSubmissionType
                mccrsID
                webURL

                reviewStatusActions {
                    updatedAt
                    actionType
                }

                draftRevision {
                    ...strippedContractRevisionFragment
                }

                latestSubmittedRevision {
                    ...strippedContractRevisionFragment
                }
            }
        }
    }
}
