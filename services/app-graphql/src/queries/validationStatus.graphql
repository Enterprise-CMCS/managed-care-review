query ValidationStatus($input: ValidationStatusInput!) {
    validationStatus(input: $input) {
        stage
        artifactVersion
        isStale
        error
        coverageSummary {
            isPartial
            skippedDocuments
            failedDocuments
            ocrCappedDocuments
            deferredDocuments
            unprocessedDocuments
        }
        results {
            field
            outcome
            confidence
            message
            citations {
                chunkId
                documentName
                page
                startPage
                endPage
                order
            }
        }
    }
}
