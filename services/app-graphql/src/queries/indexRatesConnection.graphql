query indexRatesConnection($input: IndexRatesConnectionInput) {
    indexRatesConnection(input: $input) {
        totalCount
        totalPages
        edges {
            cursor
            node {
                ...rateFieldsFragment

                draftRevision {
                    ...rateRevisionFragment
                }

                revisions {
                    ...rateRevisionFragment
                }

                packageSubmissions {
                    ...ratePackageSubmissionsFragment
                }
            }
        }
        pageInfo {
            hasNextPage
            endCursor
        }
    }
}
