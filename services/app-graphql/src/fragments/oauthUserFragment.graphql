fragment oauthUserFragment on CMSUsersUnion {
    ... on CMSUser {
        id
        email
        givenName
        familyName
        role
        stateAssignments {
            code
            name
            programs {
                id
                name
                fullName
                isRateProgram
                isDeprecated
                deprecatedByProgramId
            }
        }
    }
    ... on CMSApproverUser {
        id
        email
        givenName
        familyName
        role
        stateAssignments {
            code
            name
            programs {
                id
                name
                fullName
                isRateProgram
                isDeprecated
                deprecatedByProgramId
            }
        }
    }
}
