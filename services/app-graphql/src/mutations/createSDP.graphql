mutation createSDP($input: CreateSDPInput!) {
    createSDP(input: $input) {
        sdp {
            id
            createdAt
            updatedAt
            stateCode
            stateNumber
            mccrsID
            draftRevision {
                id
                sdpID
                createdAt
                updatedAt
                relatedContracts {
                    id
                    stateCode
                    stateNumber
                    contractSubmissionType
                    status
                    reviewStatus
                    consolidatedStatus
                    mccrsID
                }
                formData {
                    submissionType
                    programIDs
                    changesIncluded
                    ratingPeriodStart
                    ratingPeriodEnd
                    estimatedFederalShare
                    estimatedStateShare
                    automaticallyRenewed
                }
            }
            revisions {
                id
                sdpID
                createdAt
                updatedAt
                relatedContracts {
                    id
                    stateCode
                    stateNumber
                    contractSubmissionType
                    status
                    reviewStatus
                    consolidatedStatus
                    mccrsID
                }
                formData {
                    submissionType
                    programIDs
                    changesIncluded
                    ratingPeriodStart
                    ratingPeriodEnd
                    estimatedFederalShare
                    estimatedStateShare
                    automaticallyRenewed
                }
            }
        }
    }
}
