mutation overrideContractData($input: OverrideContractDataInput!) {
    overrideContractData(input: $input) {
        contract {
            ...contractFieldsFragment

            draftRevision {
                ...contractRevisionFragment
            }

            draftRates {
                ...rateFieldsFragment

                draftRevision {
                    ...rateRevisionFragment
                }

                revisions {
                    ...rateRevisionFragment
                }
            }

            withdrawnRates {
                ...rateFieldsFragment
                revisions {
                    ...rateRevisionFragment
                }
                packageSubmissions {
                    ...ratePackageSubmissionsFragment
                }
            }

            packageSubmissions {
                ...packageSubmissionsFragment
            }

            contractOverrides {
                ...contractOverridesFragment
            }
        }
    }
}
