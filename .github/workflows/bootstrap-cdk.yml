name: Bootstrap AWS CDK

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to bootstrap'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev

  push:
    paths:
      - '.github/workflows/bootstrap-cdk.yml'

permissions:
  id-token: write

jobs:
  bootstrap-cdk:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-20.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup env
        uses: ./.github/actions/setup_env

      - name: Get AWS credentials
        uses: Enterprise-CMCS/managed-care-review/.github/actions/get_aws_credentials@mt-awscdk-migrate-ui
        with:
          region: ${{ vars.AWS_DEFAULT_REGION }}
          account-id: ${{ secrets.DEV_AWS_ACCOUNT_ID }}
          stage-name: main

      - name: Bootstrap CDK
        run: |
          pushd infrastructure/cdk && \
          pnpm install && pnpm build && \
          pnpm dlx cdk bootstrap \
            --cloudformation-execution-policies arn:aws:iam::${{secrets.DEV_AWS_ACCOUNT_ID}}:policy/cms-cloud-admin/ct-ado-poweruser-permissions-boundary-policy \
            --custom-permissions-boundary arn:aws:iam::${{secrets.DEV_AWS_ACCOUNT_ID}}:policy/cms-cloud-admin/ct-ado-poweruser-permissions-boundary-policy \
            --toolkit-stack-name CDKToolkitMCReviewDev \
            aws://${{ secrets.DEV_AWS_ACCOUNT_ID }}/${{ vars.AWS_DEFAULT_REGION }}
