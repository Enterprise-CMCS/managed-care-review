name: CDK Production Deploy

on:
  push:
    branches: 
      - feat/cdk-infra-setup
      - main
    paths:
      - 'services/infra-cdk/**'
      - 'services/app-web/**'
      - '.github/workflows/cdk-deploy-production.yml'
  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage to deploy'
        required: true
        type: choice
        options:
          - dev
          - val
          - prod
        default: dev

env:
  AWS_REGION: us-east-1
  NODE_VERSION: 20
  STAGE: ${{ github.event.inputs.stage || (github.ref_name == 'main' && 'prod' || 'dev') }}

# Prevent parallel deployments
concurrency:
  group: cdk-deploy-${{ github.ref }}-${{ github.event.inputs.stage || 'auto' }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    outputs:
      api-url: ${{ steps.export-config.outputs.api-url }}
      cognito-region: ${{ steps.export-config.outputs.cognito-region }}
      cognito-user-pool-id: ${{ steps.export-config.outputs.cognito-user-pool-id }}
      cognito-client-id: ${{ steps.export-config.outputs.cognito-client-id }}
      s3-documents-bucket: ${{ steps.export-config.outputs.s3-documents-bucket }}
      s3-qa-bucket: ${{ steps.export-config.outputs.s3-qa-bucket }}
      application-endpoint: ${{ steps.export-config.outputs.application-endpoint }}
      storybook-endpoint: ${{ steps.export-config.outputs.storybook-endpoint }}
    
    steps:
    # 1. Setup environment
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history for accurate change detection

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'

    # 2. Cache dependencies
    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          ~/.cache/prisma
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    # 3. Install and build
    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build packages
      run: pnpm build:packages

    - name: Run tests
      run: pnpm test
      continue-on-error: true  # Don't fail deployment for test failures in dev

    # 4. Configure AWS credentials via OIDC
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole-MCR
        role-session-name: GitHubActions-CDK-Deploy-${{ github.run_id }}
        aws-region: ${{ env.AWS_REGION }}

    # 5. CDK Bootstrap (if needed)
    - name: CDK Bootstrap
      working-directory: services/infra-cdk
      run: |
        npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }} \
          --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess \
          -c stage=${{ env.STAGE }} || true

    # 6. Deploy OIDC stack (one-time)
    - name: Deploy GitHub OIDC Stack
      if: github.ref == 'refs/heads/main'
      working-directory: services/infra-cdk
      run: |
        npx cdk deploy github-oidc-stack \
          --require-approval never \
          --ci

    # 7. Deploy Lambda layers
    - name: Deploy Lambda Layers
      id: deploy-layers
      working-directory: services/infra-cdk
      run: |
        npx cdk deploy lambda-layers-stack-${{ env.STAGE }} \
          --require-approval never \
          --ci \
          -c stage=${{ env.STAGE }}
        
        # Get layer ARNs from stack outputs
        PRISMA_LAYER_ARN=$(aws cloudformation describe-stacks \
          --stack-name lambda-layers-stack-${{ env.STAGE }} \
          --query 'Stacks[0].Outputs[?OutputKey==`PrismaLayerArn`].OutputValue' \
          --output text)
        POSTGRES_TOOLS_LAYER_ARN=$(aws cloudformation describe-stacks \
          --stack-name lambda-layers-stack-${{ env.STAGE }} \
          --query 'Stacks[0].Outputs[?OutputKey==`PostgresToolsLayerArn`].OutputValue' \
          --output text)
        
        echo "prisma-layer-arn=$PRISMA_LAYER_ARN" >> $GITHUB_OUTPUT
        echo "postgres-tools-layer-arn=$POSTGRES_TOOLS_LAYER_ARN" >> $GITHUB_OUTPUT

    # 8. Deploy infrastructure stacks
    - name: Deploy CDK Infrastructure
      working-directory: services/infra-cdk
      run: |
        # Deploy all stacks with layer ARNs
        npx cdk deploy --all \
          --require-approval never \
          --ci \
          -c stage=${{ env.STAGE }} \
          -c prismaLayerArn=${{ steps.deploy-layers.outputs.prisma-layer-arn }} \
          -c postgresToolsLayerArn=${{ steps.deploy-layers.outputs.postgres-tools-layer-arn }}

    # 9. Export build configuration
    - name: Export build configuration
      id: export-config
      run: |
        # Create script to export all CloudFormation outputs
        cat > export-outputs.sh << 'EOF'
        #!/bin/bash
        set -e
        
        STAGE=$1
        
        # Function to get stack output
        get_output() {
          local stack=$1
          local output_key=$2
          aws cloudformation describe-stacks \
            --stack-name "$stack" \
            --query "Stacks[0].Outputs[?OutputKey=='$output_key'].OutputValue" \
            --output text 2>/dev/null || echo ""
        }
        
        # Export all required values
        echo "api-url=$(get_output "infra-api-$STAGE" "ApiGatewayRestApiUrl")" >> $GITHUB_OUTPUT
        echo "cognito-region=$(get_output "ui-auth-$STAGE" "Region")" >> $GITHUB_OUTPUT
        echo "cognito-user-pool-id=$(get_output "ui-auth-$STAGE" "UserPoolId")" >> $GITHUB_OUTPUT
        echo "cognito-client-id=$(get_output "ui-auth-$STAGE" "UserPoolClientId")" >> $GITHUB_OUTPUT
        echo "cognito-client-domain=$(get_output "ui-auth-$STAGE" "UserPoolClientDomain")" >> $GITHUB_OUTPUT
        echo "cognito-identity-pool-id=$(get_output "ui-auth-$STAGE" "IdentityPoolId")" >> $GITHUB_OUTPUT
        echo "s3-documents-bucket=$(get_output "uploads-$STAGE" "DocumentUploadsBucketName")" >> $GITHUB_OUTPUT
        echo "s3-qa-bucket=$(get_output "uploads-$STAGE" "QAUploadsBucketName")" >> $GITHUB_OUTPUT
        echo "application-endpoint=$(get_output "ui-$STAGE" "CloudFrontEndpointUrl")" >> $GITHUB_OUTPUT
        echo "storybook-endpoint=$(get_output "storybook-$STAGE" "CloudFrontEndpointUrl")" >> $GITHUB_OUTPUT
        
        # Export as environment variables for build
        echo "VITE_APP_API_URL=$(get_output "infra-api-$STAGE" "ApiGatewayRestApiUrl")" >> $GITHUB_ENV
        echo "VITE_APP_AUTH_MODE=AWS_COGNITO" >> $GITHUB_ENV
        echo "VITE_APP_COGNITO_REGION=$(get_output "ui-auth-$STAGE" "Region")" >> $GITHUB_ENV
        echo "VITE_APP_COGNITO_ID_POOL_ID=$(get_output "ui-auth-$STAGE" "IdentityPoolId")" >> $GITHUB_ENV
        echo "VITE_APP_COGNITO_USER_POOL_ID=$(get_output "ui-auth-$STAGE" "UserPoolId")" >> $GITHUB_ENV
        echo "VITE_APP_COGNITO_USER_POOL_CLIENT_ID=$(get_output "ui-auth-$STAGE" "UserPoolClientId")" >> $GITHUB_ENV
        echo "VITE_APP_COGNITO_USER_POOL_CLIENT_DOMAIN=$(get_output "ui-auth-$STAGE" "UserPoolClientDomain")" >> $GITHUB_ENV
        echo "VITE_APP_S3_REGION=$AWS_REGION" >> $GITHUB_ENV
        echo "VITE_APP_S3_DOCUMENTS_BUCKET=$(get_output "uploads-$STAGE" "DocumentUploadsBucketName")" >> $GITHUB_ENV
        echo "VITE_APP_S3_QA_BUCKET=$(get_output "uploads-$STAGE" "QAUploadsBucketName")" >> $GITHUB_ENV
        echo "VITE_APP_STAGE_NAME=$STAGE" >> $GITHUB_ENV
        echo "VITE_APP_APPLICATION_ENDPOINT=$(get_output "ui-$STAGE" "CloudFrontEndpointUrl")" >> $GITHUB_ENV
        echo "VITE_APP_OTEL_COLLECTOR_URL=$(get_output "infra-api-$STAGE" "ApiGatewayRestApiUrl")/otel" >> $GITHUB_ENV
        
        # Add additional environment variables
        echo "VITE_APP_LD_CLIENT_ID=${{ secrets.VITE_APP_LD_CLIENT_ID || 'placeholder' }}" >> $GITHUB_ENV
        echo "VITE_APP_NR_ACCOUNT_ID=${{ secrets.VITE_APP_NR_ACCOUNT_ID || 'placeholder' }}" >> $GITHUB_ENV
        echo "VITE_APP_NR_AGENT_ID=${{ secrets.VITE_APP_NR_AGENT_ID || 'placeholder' }}" >> $GITHUB_ENV
        echo "VITE_APP_NR_LICENSE_KEY=${{ secrets.VITE_APP_NR_LICENSE_KEY || 'placeholder' }}" >> $GITHUB_ENV
        echo "VITE_APP_NR_TRUST_KEY=${{ secrets.VITE_APP_NR_TRUST_KEY || 'placeholder' }}" >> $GITHUB_ENV
        EOF
        
        chmod +x export-outputs.sh
        ./export-outputs.sh ${{ env.STAGE }}

    # 10. Build frontend with configuration
    - name: Build Frontend
      working-directory: services/app-web
      run: |
        echo "Building frontend with CDK-provided configuration..."
        pnpm build
        
        echo "Building Storybook..."
        pnpm storybook:build

    # 11. Deploy frontend with versioned assets
    - name: Deploy Frontend
      working-directory: services/infra-cdk
      run: |
        npx cdk deploy frontend-stack-${{ env.STAGE }} \
          --require-approval never \
          --ci \
          -c stage=${{ env.STAGE }} \
          -c commitSha=${{ github.sha }}

    # 12. Output deployment information
    - name: Output Deployment Summary
      if: success()
      run: |
        echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Environment: ${{ env.STAGE }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
        echo "| Application | https://${{ steps.export-config.outputs.application-endpoint }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Storybook | https://${{ steps.export-config.outputs.storybook-endpoint }} |" >> $GITHUB_STEP_SUMMARY
        echo "| API | ${{ steps.export-config.outputs.api-url }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Build Information" >> $GITHUB_STEP_SUMMARY
        echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- Workflow Run: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

  # Optional: Run integration tests after deployment
  integration-tests:
    name: Integration Tests
    needs: deploy
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Run integration tests
      run: |
        echo "Running integration tests against ${{ needs.deploy.outputs.application-endpoint }}"
        # Add actual integration test commands here
      env:
        APP_URL: https://${{ needs.deploy.outputs.application-endpoint }}
        API_URL: ${{ needs.deploy.outputs.api-url }}