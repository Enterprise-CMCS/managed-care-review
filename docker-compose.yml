version: "3.8"
services:
  # PostgreSQL database
  postgres:
    image: postgres:16
    container_name: mcr-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: shhhsecret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # LocalStack for S3 emulation (Pinned to 4.4.0; later versions require a license)
  localstack:
    image: localstack/localstack:4.4.0
    container_name: mcr-localstack
    ports:
      - "4566:4566" # LocalStack edge port
    environment:
      - SERVICES=s3
      - DEBUG=0
      - LEGACY_S3_PROVIDER=1 # Use legacy S3 provider for better AWS SDK v3 compatibility
      - EXTRA_CORS_ALLOWED_ORIGINS=* # Allow browser uploads from localhost
      - EXTRA_CORS_ALLOWED_HEADERS=*
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Jaeger v2 for OpenTelemetry tracing (built on the OTel Collector, OTLP-native)
  jaeger-all-in-one:
    image: jaegertracing/jaeger:2.19.0
    container_name: mcr-jaeger
    ports:
      - 16686:16686 # UI
      - 4317:4317 # OTLP gRPC
      - 4318:4318 # OTLP HTTP

volumes:
  postgres_data:
    driver: local
  localstack_data:
    driver: local
